run_name: exhaustive-debug
input_path: examples/test_molecules_minimal.smi
input_format: auto
output_dir: runs/exhaustive_debug
overwrite: false
resume: true

chemistry:
  ph: 7.0
  solvent: water
  solvent_model: alpb
  temperature_kelvin: 298.15
  standardize: true
  keep_salts: false
  largest_fragment_only: true

enumeration:
  max_protomers_per_molecule: 32
  max_tautomers_per_protomer: 128
  max_tautomer_transforms: 1024
  tautomer_timeout_seconds: 120
  tautomer_strategy: exhaustive
  max_stereoisomers_per_tautomer: 128
  stereo_try_embedding: true
  stereo_only_unassigned: true
  stereo_unique: true
  stereo_random_seed: 61453
  fail_on_enumeration_cap: false

seeding:
  method: both
  rdkit_num_conformers: 100
  rdkit_prune_rms_thresh: 0.5
  rdkit_forcefield: uff
  auto3d_k: 10
  auto3d_model: AIMNet2
  auto3d_internal_tautomer_stereo_enum: false

xtb_prefilter:
  enabled: false

crest:
  enabled: true
  max_jobs_per_molecule: 64
  max_conformers_to_parse: 100
  max_conformers_to_keep: 100
  keep_raw_xyz: true
  compress_raw_outputs: false
  delete_intermediate_xyz: false
  walltime_minutes: 120

thermo:
  enabled: true
  max_variants_per_molecule: 20
  max_conformers_per_variant: 10

refinement:
  censo_enabled: false
  max_candidates_for_refinement: 5

qm:
  enabled: false
  backend: none
  max_candidates: 3

variant_filtering:
  enabled: true
  mode: exhaustive
  max_seeds_per_variant: 10

disk:
  cleanup_policy: debug_all
  keep_raw_xyz: true
  compress_raw_outputs: false
  delete_intermediate_xyz: false
  max_run_dir_gb: 100.0
  max_molecule_dir_gb: 20.0
  max_xyz_files_per_molecule: 100000
  fail_on_disk_limit: true
