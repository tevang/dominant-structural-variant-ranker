description: Practical Auto3D protocol for protomer generation, Auto3D tautomer/stereo enumeration, representative conformer generation, and SVPScore plausibility ranking.
protocol: auto3d_entropy
run_name: auto3d-representative-protocol
input_path: examples/test_molecules.smi
input_format: auto
output_dir: runs/auto3d-representative-protocol
max_workers: 1
dry_run: false
overwrite: false
resume: true

chemistry:
  ph: 7.0
  ph_low: null
  ph_high: null
  solvent: water
  solvent_model: alpb
  temperature_kelvin: 298.15
  standardize: true
  keep_salts: false
  largest_fragment_only: true

enumeration:
  max_protomers_per_molecule: 16
  max_tautomers_per_protomer: 16
  max_tautomer_transforms: 256
  tautomer_timeout_seconds: 30
  tautomer_strategy: safe
  tautomer_remove_bond_stereo: true
  tautomer_remove_sp3_stereo: true
  tautomer_reassign_stereo: true
  max_stereoisomers_per_tautomer: 16
  stereo_try_embedding: true
  stereo_only_unassigned: true
  stereo_unique: true
  stereo_random_seed: 61453
  fail_on_enumeration_cap: false

seeding:
  method: auto3d
  rdkit_num_conformers: 30
  rdkit_prune_rms_thresh: 0.5
  rdkit_forcefield: uff
  auto3d_k: 1
  auto3d_model: AIMNET
  auto3d_internal_tautomer_stereo_enum: true
  auto3d_mpi_np: 28
  auto3d_cpu_workers: 28
  auto3d_memory_gb: 1
  auto3d_capacity: 1
  auto3d_max_confs: 1
  auto3d_patience: 40
  auto3d_threshold: 0.5
  auto3d_opt_steps: 400
  auto3d_use_gpu: true
  auto3d_allow_rdkit_fallback: false

crest:
  enabled: false
  executable: crest
  xtb_executable: xtb
  gfn: 2
  ewin_kcal_mol: 6.0
  nproc: 4
  max_jobs_per_molecule: 8
  max_conformers_to_parse: 20
  max_conformers_to_keep: 5
  keep_raw_xyz: false
  compress_raw_outputs: true
  delete_intermediate_xyz: true
  cleanup_patterns: ["*.tmp", "coord.*", "struc*.xyz", "trial*.xyz"]
  walltime_minutes: null
  command_template: null
  extra_args: []

xtb_prefilter:
  enabled: false
  optimize: true
  hessian: false
  solvent_model: alpb
  solvent: water
  gfn: 2
  max_variants_per_molecule: 16
  keep_within_kcal_mol: 10.0
  keep_top_n_per_molecule: 8
  keep_top_n_per_charge: 3
  keep_top_n_per_formula: 3
  timeout_seconds_per_variant: 300
  nproc: 4

thermo:
  enabled: false
  xtb_hessian: false
  xtb_thermo: false
  rrho_cutoff: 100.0
  population_scope: all_approximate
  energy_unit: kcal/mol
  max_variants_per_molecule: 16
  max_conformers_per_variant: 1

refinement:
  censo_enabled: false
  censo_executable: censo
  censo_command_template: null
  censo_extra_args: []
  qm_backend: none
  qm_method: b3lyp
  qm_basis: def2-svp
  qm_solvent: null
  qm_optimize: false
  qm_single_point: true
  psi4_enabled: false
  pyscf_enabled: false
  max_candidates_for_refinement: 3

qm:
  enabled: false
  backend: none
  max_candidates: 3

logging:
  level: INFO
  save_subprocess_logs: true
  tail_subprocess_logs: true

variant_filtering:
  enabled: false
  mode: balanced
  max_variants_before_3d_per_molecule: 64
  max_variants_after_cheap_score_per_molecule: 24
  max_variants_for_xtb_prefilter_per_molecule: 16
  max_variants_for_crest_per_molecule: 8
  max_seeds_per_variant: 3
  keep_original_state: true
  keep_best_per_charge_state: true
  keep_best_per_formula: true
  keep_best_per_protomer: true
  keep_best_per_tautomer_family: true
  collapse_enantiomers: true
  absolute_penalty_cutoff: 12.0
  relative_penalty_cutoff: 7.0
  min_variants_to_keep: 3
  rescue_rules_enabled: true

stereo_filtering:
  collapse_enantiomers_in_achiral_solvent: false
  solvent_is_chiral: false
  run_crest_for_enantiomer_pairs_once: false
  keep_mapping_to_all_stereo_outputs: true

timeouts:
  protomer_seconds_per_molecule: 60
  tautomer_seconds_per_protomer: 30
  stereo_seconds_per_tautomer: 30
  etkdg_seconds_per_variant: 60
  auto3d_seconds_per_batch: 600
  xtb_prefilter_seconds_per_variant: 300
  crest_seconds_per_variant: 1800
  thermo_seconds_per_conformer: 600

disk:
  cleanup_policy: compact
  keep_raw_xyz: false
  compress_raw_outputs: true
  delete_intermediate_xyz: true
  max_run_dir_gb: 20.0
  max_molecule_dir_gb: 3.0
  max_xyz_files_per_molecule: 500
  fail_on_disk_limit: true
