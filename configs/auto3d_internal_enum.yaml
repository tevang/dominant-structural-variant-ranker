description: Configuration enabling Auto3D's internal tautomer and stereoisomer enumeration.
run_name: auto3d-internal-enum
input_path: examples/test_molecules.smi
input_format: auto
output_dir: runs/auto3d-internal-enum
max_workers: 1
dry_run: false
overwrite: false
resume: true

chemistry:
  ph: 7.0
  ph_low: null
  ph_high: null
  solvent: water
  solvent_model: alpb
  temperature_kelvin: 298.15
  standardize: true
  keep_salts: false
  largest_fragment_only: true

enumeration:
  max_protomers_per_molecule: 32
  max_tautomers_per_protomer: 32
  max_tautomer_transforms: 256
  tautomer_timeout_seconds: 30
  tautomer_strategy: safe
  tautomer_remove_bond_stereo: true
  tautomer_remove_sp3_stereo: true
  tautomer_reassign_stereo: true
  max_stereoisomers_per_tautomer: 64
  stereo_try_embedding: true
  stereo_only_unassigned: true
  stereo_unique: true
  stereo_random_seed: 61453
  fail_on_enumeration_cap: false

seeding:
  method: auto3d
  rdkit_num_conformers: 30
  rdkit_prune_rms_thresh: 0.5
  rdkit_forcefield: uff
  auto3d_k: 3
  auto3d_model: AIMNet2
  auto3d_internal_tautomer_stereo_enum: true
  auto3d_use_gpu: true

crest:
  enabled: true
  executable: crest
  xtb_executable: xtb
  gfn: 2
  ewin_kcal_mol: 6.0
  nproc: 4
  walltime_minutes: null
  command_template: null
  extra_args: []

thermo:
  enabled: true
  xtb_hessian: true
  xtb_thermo: true
  rrho_cutoff: 100.0
  population_scope: same_formula
  energy_unit: kcal/mol

refinement:
  censo_enabled: false
  psi4_enabled: false
  pyscf_enabled: false
  max_candidates_for_refinement: 5

logging:
  level: INFO
  save_subprocess_logs: true
  tail_subprocess_logs: true

variant_filtering:
  enabled: true
  mode: balanced
  max_variants_before_3d_per_molecule: 64
  max_variants_after_cheap_score_per_molecule: 24
  max_variants_for_xtb_prefilter_per_molecule: 16
  max_variants_for_crest_per_molecule: 8
  max_seeds_per_variant: 2
  keep_original_state: true
  keep_best_per_charge_state: true
  keep_best_per_formula: true
  keep_best_per_protomer: true
  keep_best_per_tautomer_family: true
  absolute_penalty_cutoff: 12.0
  relative_penalty_cutoff: 7.0
  min_variants_to_keep: 3
  rescue_rules_enabled: true
  collapse_enantiomers: true

stereo_filtering:
  collapse_enantiomers_in_achiral_solvent: true
  solvent_is_chiral: false
  run_crest_for_enantiomer_pairs_once: true
  keep_mapping_to_all_stereo_outputs: true

timeouts:
  protomer_seconds_per_molecule: 60
  tautomer_seconds_per_protomer: 30
  stereo_seconds_per_tautomer: 30
  etkdg_seconds_per_variant: 60
  auto3d_seconds_per_batch: 600
  xtb_prefilter_seconds_per_variant: 300
  crest_seconds_per_variant: 1800
  thermo_seconds_per_conformer: 600

disk:
  cleanup_policy: compact
  keep_raw_xyz: false
  compress_raw_outputs: true
  delete_intermediate_xyz: true
  max_run_dir_gb: 20.0
  max_molecule_dir_gb: 3.0
  max_xyz_files_per_molecule: 500
  fail_on_disk_limit: true
