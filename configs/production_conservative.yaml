description: Conservative production profile with aggressive filtering and smaller budgets for faster runs.
run_name: production-conservative
input_path: examples/test_molecules.smi
input_format: auto
output_dir: runs/production_conservative
overwrite: false
resume: true
max_workers: 1

chemistry:
  ph: 7.0
  ph_low: null
  ph_high: null
  solvent: water
  solvent_model: alpb
  temperature_kelvin: 298.15
  standardize: true
  keep_salts: false
  largest_fragment_only: true

enumeration:
  max_protomers_per_molecule: 4
  max_tautomers_per_protomer: 16
  max_tautomer_transforms: 128
  tautomer_timeout_seconds: 30
  tautomer_strategy: safe
  tautomer_remove_bond_stereo: true
  tautomer_remove_sp3_stereo: true
  tautomer_reassign_stereo: true
  max_stereoisomers_per_tautomer: 16
  stereo_try_embedding: true
  stereo_only_unassigned: true
  stereo_unique: true
  stereo_random_seed: 61453
  fail_on_enumeration_cap: false

seeding:
  method: etkdg
  rdkit_num_conformers: 10
  rdkit_prune_rms_thresh: 0.5
  rdkit_forcefield: uff
  auto3d_k: 1
  auto3d_model: AIMNet2
  auto3d_internal_tautomer_stereo_enum: false

xtb_prefilter:
  enabled: true
  optimize: true
  hessian: false
  solvent_model: alpb
  solvent: water
  gfn: 2
  max_variants_per_molecule: 8
  keep_within_kcal_mol: 8.0
  keep_top_n_per_molecule: 4
  keep_top_n_per_charge: 2
  keep_top_n_per_formula: 2
  timeout_seconds_per_variant: 300
  nproc: 4

crest:
  enabled: true
  max_jobs_per_molecule: 4
  max_conformers_to_parse: 10
  max_conformers_to_keep: 3
  keep_raw_xyz: false
  compress_raw_outputs: true
  delete_intermediate_xyz: true
  walltime_minutes: 30

thermo:
  enabled: true
  xtb_hessian: true
  xtb_thermo: true
  population_scope: same_formula
  max_variants_per_molecule: 3
  max_conformers_per_variant: 2

refinement:
  censo_enabled: false
  max_candidates_for_refinement: 3

qm:
  enabled: false
  backend: none
  max_candidates: 3

variant_filtering:
  enabled: true
  mode: conservative
  max_variants_after_cheap_score_per_molecule: 12
  max_variants_for_xtb_prefilter_per_molecule: 8
  max_variants_for_crest_per_molecule: 4
  max_seeds_per_variant: 1

stereo_filtering:
  collapse_enantiomers_in_achiral_solvent: true
  solvent_is_chiral: false
  run_crest_for_enantiomer_pairs_once: true
  keep_mapping_to_all_stereo_outputs: true

disk:
  cleanup_policy: compact
  keep_raw_xyz: false
  max_run_dir_gb: 10.0
  max_molecule_dir_gb: 1.5
  max_xyz_files_per_molecule: 250
  fail_on_disk_limit: true
