name: dsvr
channels:
  - conda-forge
dependencies:
  - python>=3.11
  - rdkit
  - numpy
  - pandas
  - pyyaml
  - typer
  - rich
  - pydantic
  - pytest
  - pytest-cov
  - ruff
  - mypy
  - pip
  # Optional Python packages can be installed by the bootstrap scripts:
  #   python -m pip install Auto3D
  #   python -m pip install git+https://github.com/forlilab/molscrub.git
  #   python -m pip install pyscf
  # Optional external binaries such as xtb, crest, censo, and psi4 may be installed
  # through conda-forge, upstream release binaries, or HPC module systems.
